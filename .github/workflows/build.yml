name: Build Android APK on GitHub

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔍 Find Exact JS Errors (Expo Export)
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npx expo export --platform android

      - name: 🚀 Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: ☕ Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔑 Generate Keystore
        run: keytool -genkey -v -keystore android/temp.keystore -storepass android -alias tempkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=App Release"

      - name: 🔨 Build Release APK
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease -Pandroid.injected.signing.store.file=temp.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=tempkey -Pandroid.injected.signing.key.password=android --stacktrace

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecureChatApp-APK
          path: android/app/build/outputs/apk/release/app-release.apk
