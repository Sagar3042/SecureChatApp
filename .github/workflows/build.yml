name: Build Android APK on GitHub

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔧 Fix Expo Dependencies
        run: npx expo install --fix

      - name: 🚀 Expo Prebuild (Clean)
        run: npx expo prebuild --platform android --clean

      - name: ☕ Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔑 Generate Auto Keystore
        run: keytool -genkey -v -keystore android/temp.keystore -storepass android -alias tempkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=App Release"

      - name: 🔨 Build Release APK (Standalone)
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease -Pandroid.injected.signing.store.file=temp.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=tempkey -Pandroid.injected.signing.key.password=android --stacktrace

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecureChatApp-Final-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
